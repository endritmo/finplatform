name: Test, Build & Deploy FinPlatform to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_BACKEND:  endritmorina1/finplatform-backend
  IMAGE_FRONTEND: endritmorina1/finplatform-frontend

jobs:
  # ── Job 1: Lint and basic validation ─────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Check Django configuration
        env:
          SECRET_KEY: ci-test-key-that-is-long-enough-to-pass-validation-check-123456
          DATABASE_URL: sqlite:////tmp/test.db
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost"
          GROQ_API_KEY: "test"
          NEWS_API_KEY: "test"
        run: |
          cd backend
          python manage.py check
          python manage.py migrate --run-syncdb

  # ── Job 2: Build Docker images and push to Docker Hub ────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Trigger Render to redeploy both services ──────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger backend redeploy on Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            --max-time 30
          echo "Backend deploy triggered ✓"

      - name: Wait for backend to become healthy
        run: |
          echo "Waiting 60 seconds for backend to start..."
          sleep 60
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://finplatform-backend.onrender.com/api/health/)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed (attempt $i) ✓"
              break
            fi
            echo "Attempt $i: status $STATUS, waiting 15s..."
            sleep 15
          done

      - name: Trigger frontend redeploy on Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            --max-time 30
          echo "Frontend deploy triggered ✓"

      - name: Deployment summary
        run: |
          echo "============================================"
          echo " Deployment Complete"
          echo " Backend:  https://finplatform-backend.onrender.com"
          echo " Frontend: https://finplatform-frontend.onrender.com"
          echo " Commit:   ${{ github.sha }}"
          echo "============================================"