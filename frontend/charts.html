<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charts | FinPlatform</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="container">
    <div class="page-header">
      <h2>Market Charts</h2>
      <div class="symbol-selector">
        <select id="preset-select">
          <option value="">Loading symbols…</option>
        </select>
        <div class="search-wrapper">
          <span class="search-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M21 21L16.65 16.65M11 18A7 7 0 1 1 11 4a7 7 0 0 1 0 14z"
                    stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <input type="text" id="symbol-search" class="search-input" placeholder="Search symbol…" />
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div id="tradingview_chart" style="height: calc(100vh - 200px); width: 100%;"></div>
    </div>
  </main>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script type="module">
    import { renderNav, renderAIChat } from '/js/nav.js';
    import { getSymbols } from '/js/api.js';
    renderNav();
    renderAIChat();

    let widget;
    const params = new URLSearchParams(window.location.search);
    let currentSymbol = params.get('symbol') || 'BINANCE:BTCUSDT';

    function loadChart(symbol) {
      currentSymbol = symbol;
      if (widget) { widget.remove(); }
      widget = new TradingView.widget({
        autosize: true, symbol, interval: 'D',
        timezone: 'Etc/UTC', theme: 'dark', style: '1', locale: 'en',
        enable_publishing: false, backgroundColor: '#111827',
        gridColor: '#1f2937', hide_top_toolbar: false, save_image: false,
        container_id: 'tradingview_chart',
      });
    }

    // Populate the symbol dropdown from the API
    getSymbols().then(data => {
      const sel = document.getElementById('preset-select');
      sel.innerHTML = '';
      Object.entries(data).forEach(([group, items]) => {
        const og = document.createElement('optgroup');
        og.label = group;
        items.forEach(({ label, value }) => {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = label;
          if (value === currentSymbol) opt.selected = true;
          og.appendChild(opt);
        });
        sel.appendChild(og);
      });
    });

    document.getElementById('preset-select').addEventListener('change', (e) => {
      if (e.target.value) {
        document.getElementById('symbol-search').value = '';
        loadChart(e.target.value);
      }
    });

    document.getElementById('symbol-search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        document.getElementById('preset-select').value = '';
        loadChart(e.target.value.trim().toUpperCase());
      }
    });

    loadChart(currentSymbol);
  </script>
  <script src="/js/chat.js" defer></script>
</body>
</html>
