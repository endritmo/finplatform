<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar | FinPlatform</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="container">
    <div class="page-header">
      <div>
        <h2>Economic Calendar</h2>
        <p>Upcoming macroeconomic events and data releases.</p>
      </div>
    </div>
    <div class="calendar-container">
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
        {
          "colorTheme": "dark", "isTransparent": false, "locale": "en",
          "countryFilter": "au,fr,de,jp,gb,us,eu", "importanceFilter": "0,1",
          "width": "100%", "height": 800
        }
      </script>
    </div>
  </main>
  <script type="module">
    import { renderNav, renderAIChat } from '/js/nav.js';
    renderNav();
    renderAIChat();
  </script>
  <script src="/js/chat.js" defer></script>
</body>
</html>
